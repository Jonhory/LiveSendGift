name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 供应链最小权限：所有 job 只读代码
permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Pod install
        run: pod install

      - name: Build & run tests
        run: |
          set -o pipefail
          # 不写死设备名：runner 镜像更新会替换可用模拟器型号
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+[^(]*' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -workspace LiveSendGift.xcworkspace \
            -scheme LiveSendGiftDemo \
            -destination "platform=iOS Simulator,name=$DEVICE"

  swift-test:
    name: Swift 版 SPM Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # 仓库根目录同时存在 workspace 与 Package.swift，
      # xcodebuild 会优先解析 workspace，故在干净目录中按 SPM 包测试
      - name: SPM test
        run: |
          set -o pipefail
          rsync -a --exclude='*.xcodeproj' --exclude='*.xcworkspace' --exclude='Pods' . /tmp/spm-pkg
          cd /tmp/spm-pkg
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+[^(]*' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -scheme LiveSendGift-Package \
            -destination "platform=iOS Simulator,name=$DEVICE"

  lint:
    name: Pod lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 版本一致性检查（podspec ↔ Info.plist）
        run: |
          POD_VERSION=$(sed -n "s/.*s\.version *= *'\([^']*\)'.*/\1/p" LiveSendGift.podspec)
          SWIFT_POD_VERSION=$(sed -n "s/.*s\.version *= *'\([^']*\)'.*/\1/p" LiveSendGiftSwift.podspec)
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" LiveSendGift/Info.plist)
          echo "LiveSendGift.podspec=$POD_VERSION LiveSendGiftSwift.podspec=$SWIFT_POD_VERSION Info.plist=$PLIST_VERSION"
          test -n "$POD_VERSION"
          test "$POD_VERSION" = "$SWIFT_POD_VERSION"
          test "$POD_VERSION" = "$PLIST_VERSION"

      - name: Lint podspec（默认 subspec 含 SDWebImage）
        run: pod lib lint LiveSendGift.podspec --allow-warnings

      - name: Lint Core subspec（零三方依赖）
        run: pod lib lint LiveSendGift.podspec --allow-warnings --subspec=Core

      - name: Lint Swift podspec
        run: pod lib lint LiveSendGiftSwift.podspec --allow-warnings
